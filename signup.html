<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EvaMe - Sign Up</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #E8DDC8;
  color: #5C3B2E;
}

/* Layout */
.container {
  display: flex;
  height: 100vh;
}

/* LEFT SIDE */
.left {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px;
}

.form-box {
  max-width: 400px;
  width: 100%;
}

h1 {
  font-family: 'Playfair Display', serif;
  margin-bottom: 10px;
}

.subtitle {
  color: #7A6A58;
  margin-bottom: 30px;
}

/* Inputs */
input {
  width: 100%;
  padding: 12px;
  margin-bottom: 15px;
  border-radius: 8px;
  border: 1px solid #D6C7B0;
  background: #F5EFE6;
}

/* Button */
.btn {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  background: #F28C48;
  color: white;
  font-weight: 500;
  cursor: pointer;
}

.btn:hover {
  background: #E07A3F;
}

/* Link */
.link {
  margin-top: 15px;
  text-align: center;
  color: #7A6A58;
}

.link a {
  color: #F28C48;
  text-decoration: none;
}

/* RIGHT SIDE */
.right {
  flex: 1;
  background: #F5EFE6;
  display: flex;
  align-items: center;
  justify-content: center;
}

.right img {
  width: 70%;
}

</style>

</head>

<body>

<div class="container">

  <!-- LEFT -->
  <div class="left">
    <div class="form-box">

      <h1>Create Account</h1>
      <p class="subtitle">Start evaluating and certifying your AI models today.</p>

      <form>
        <input type="text" placeholder="Full Name" required>
        <input type="email" placeholder="Email Address" required>
        <input type="password" placeholder="Password" required>

        <button class="btn" type="submit">Sign Up</button>
      </form>

      <div class="link">
        Already have an account? <a href="#">Login</a>
      </div>

    </div>
  </div>


</div>
<form onsubmit="alert('Account created successfully!'); return false;"></form>
</body>
</html>
